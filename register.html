<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - Smart Waste System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <div class="card register-card">
    <h2>Create Account</h2>
    <p class="subtitle">Join Smart Waste System</p>
    
    <div id="registerError" class="error-message"></div>
    <div id="registerSuccess" class="success-message"></div>
    
    <label>Full Name</label>
    <input type="text" id="regName" placeholder="Enter your full name">
    
    <label>Email</label>
    <input type="email" id="regEmail" placeholder="Enter your email">
    
    <label>Phone</label>
    <input type="tel" id="regPhone" placeholder="Enter your phone number">
    
    <label>Address</label>
    <input type="text" id="regAddress" placeholder="Enter your address">
    
    <label>Password</label>
    <input type="password" id="regPassword" placeholder="Create password">
    
    <label>Confirm Password</label>
    <input type="password" id="regConfirmPassword" placeholder="Confirm password">
    
    <label>Register As</label>
    <select id="regRole">
      <option value="resident">Resident</option>
      <option value="collector">Collector</option>
    </select>
    
    <button onclick="handleRegister()">Register</button>
    
    <p class="link" onclick="goLogin()">Already have an account? Login here</p>
  </div>
</div>

<script src="script.js"></script>
<script>
  function handleRegister() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const phone = document.getElementById('regPhone').value.trim();
    const address = document.getElementById('regAddress').value.trim();
    const password = document.getElementById('regPassword').value;
    const confirmPassword = document.getElementById('regConfirmPassword').value;
    const role = document.getElementById('regRole').value;
    
    // Validation
    if (!name || !email || !phone || !password) {
      showError('Please fill all required fields');
      return;
    }
    
    if (password !== confirmPassword) {
      showError('Passwords do not match');
      return;
    }
    
    if (password.length < 6) {
      showError('Password must be at least 6 characters');
      return;
    }
    
    // Register user
    const user = registerUser(name, email, phone, address, password, role);
    
    if (user) {
      showSuccess('Registration successful! Redirecting...');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 1500);
    } else {
      showError('Email already registered');
    }
  }
  
  function showError(message) {
    const errorDiv = document.getElementById('registerError');
    errorDiv.textContent = message;
    errorDiv.style.display = 'block';
    document.getElementById('registerSuccess').style.display = 'none';
    setTimeout(() => {
      errorDiv.style.display = 'none';
    }, 3000);
  }
  
  function showSuccess(message) {
    const successDiv = document.getElementById('registerSuccess');
    successDiv.textContent = message;
    successDiv.style.display = 'block';
    document.getElementById('registerError').style.display = 'none';
  }
  
  function goLogin() {
    window.location.href = 'login.html';
  }
  
  // Enter key support
  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
      handleRegister();
    }
  });
</script>

</body>
</html>
